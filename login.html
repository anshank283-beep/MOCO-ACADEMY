<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCO ACADEMY - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="/logo.png" alt="MOCO ACADEMY Logo" class="logo-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="logo-icon" style="display: none;">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>MOCO ACADEMY</h1>
                <p>LEARN • GROW • SUCCEED</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Username" 
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Password" 
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">
                    <span class="btn-text">Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div class="login-footer">
                <p><i class="fas fa-shield-alt"></i> Secure Login</p>
                <p class="device-note"><i class="fas fa-mobile-alt"></i> Single Device Access</p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
